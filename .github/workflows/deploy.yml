name: CI/CD Pipeline

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # Job 1: test
  # Runs on every push and every pull request.
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install \
            fastapi==0.111.0 \
            uvicorn==0.29.0 \
            mlflow==2.13.0 \
            scikit-learn==1.4.2 \
            "feast[redis]==0.38.0" \
            prometheus-client==0.20.0 \
            numpy==1.26.4 \
            pandas==2.2.2 \
            pydantic==2.7.0 \
            psycopg2-binary==2.9.9 \
            httpx \
            pytest

      - name: Run pytest
        run: pytest app/tests/ -v

  # ══════════════════════════════════════════════════════════════════════════
  # Job 2: infrastructure (optional — runs only when PULUMI_ACCESS_TOKEN set)
  # Provisions / updates AWS resources via Pulumi (incremental update).
  # CI/CD Strategy: INCREMENTAL UPDATE — not destroy-and-recreate.
  # NOTE: Infrastructure can also be deployed manually from Poridhi VM with:
  #   cd infrastructure && pulumi up --yes
  # ══════════════════════════════════════════════════════════════════════════
  infrastructure:
    name: Pulumi Infrastructure
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.PULUMI_ACCESS_TOKEN != ''
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Pulumi dependencies
        run: pip install -r infrastructure/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Pulumi up (incremental update)
        uses: pulumi/actions@v5
        with:
          command: up
          stack-name: prod
          work-dir: infrastructure
          upsert: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

  # ══════════════════════════════════════════════════════════════════════════
  # Job 3: build-and-push
  # Runs on pushes to main, after test passes.
  # Builds the Docker image and pushes it to ECR.
  # ══════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: modelserve-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ══════════════════════════════════════════════════════════════════════════
  # Job 4: deploy
  # Runs after build-and-push succeeds.
  # SSHes into EC2, pulls the new image, restarts only the API container.
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy & Verify
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/modelserve

            # Pull latest code
            git pull origin main

            # Login to ECR and pull new image
            AWS_REGION=ap-southeast-1
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            aws ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin \
                $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

            docker compose pull api

            # Restart only the API container (incremental update)
            docker compose up api -d --force-recreate

            # Wait for API to come back up
            sleep 20

      - name: Verify health endpoint
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.DEPLOY_HOST }}:8000/health || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 12 attempts"
          exit 1
