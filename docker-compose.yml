# ============================================================================
# ModelServe — Docker Compose (Local Development)
# ============================================================================

services:
  postgres:
    image: postgres:15
    container_name: modelserve-postgres
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.0
    container_name: modelserve-mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///tmp/mlflow.db
      --default-artifact-root /tmp/mlflow-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    environment:
      MLFLOW_TRACKING_URI: http://localhost:5000
    volumes:
      - mlflow_artifacts:/tmp/mlflow-artifacts
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: modelserve-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mlflow_artifacts: