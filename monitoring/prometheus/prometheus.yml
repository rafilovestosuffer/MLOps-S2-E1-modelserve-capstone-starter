global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'modelserve'
    environment: 'development'

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'modelserve-api'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'modelserve-api'
          component: 'inference'

